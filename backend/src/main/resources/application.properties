spring.application.name=sales-automation-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

# JPA defaults (overridden per profile)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka defaults
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=sales-automation-group

# Security (values injected via env in prod)
app.security.jwt.secret=${JWT_SECRET:}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:1000}
app.security.rate-limit.webhook-requests-per-minute=${WEBHOOK_RATE_LIMIT_RPM:100}

# Crypto
crypto.secret.key=${CRYPTO_MASTER_KEY:}

# Stripe
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/salesdb}
spring.datasource.username=${DATABASE_USERNAME:admin}
spring.datasource.password=${DATABASE_PASSWORD:}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Mail
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_TLS:false}

# Upload
app.upload.max-file-size-bytes=${UPLOAD_MAX_BYTES:5242880}
