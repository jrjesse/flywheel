spring.application.name=sales-automation-api

spring.datasource.url=jdbc:postgresql://localhost:5432/salesdb
spring.datasource.username=admin
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=sales-automation-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

server.port=8080

# Mail Mock Configuration (e.g., MailHog / GreenMail or just console logs)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=user
spring.mail.password=pass
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
logging.level.org.springframework.mail=DEBUG

# Stripe Configuration
stripe.api.key=sk_test_1234567890abcdef
stripe.webhook.secret=whsec_1234567890abcdef

# Crypto Configuration for LGPD
crypto.secret.key=0123456789abcdef0123456789abcdef
